<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vehicle Expiration Alert</title>
    <script type="text/javascript" src="/eel.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            user-select: none;
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        .drag-region {
            -webkit-app-region: drag;
        }

        .no-drag {
            -webkit-app-region: no-drag;
        }
    </style>
</head>

<body
    class="bg-slate-50 h-screen w-screen border border-slate-300 rounded-xl shadow-2xl flex flex-col overflow-hidden drag-region">

    <!-- Header -->
    <div class="bg-slate-800 text-white px-5 py-4 flex items-center justify-between shadow-md">
        <div class="flex items-center space-x-3">
            <div
                class="w-8 h-8 rounded-full bg-red-500 flex items-center justify-center animate-pulse shadow-lg shadow-red-500/50">
                <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z">
                    </path>
                </svg>
            </div>
            <h1 class="text-lg font-bold tracking-tight">Vehicle Update Detected</h1>
        </div>
        <button onclick="closeWindow()"
            class="no-drag text-slate-400 hover:text-white hover:bg-slate-700 p-1.5 rounded-full transition-colors duration-200 focus:outline-none">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
            </svg>
        </button>
    </div>

    <!-- Scrollable Alert List -->
    <div class="flex-1 overflow-y-auto p-5 no-drag" id="alerts-container">
        <!-- JS Injected Content -->
        <div class="text-slate-500 italic text-sm text-center mt-10">Waiting for data...</div>
    </div>

    <!-- Footer Controls -->
    <div class="bg-white border-t border-slate-200 p-4 no-drag">
        <div class="flex flex-col space-y-3">
            <p id="status-text" class="text-xs text-slate-500 italic font-medium">Ready</p>
            <div class="flex items-center justify-between">
                <select id="month-select" onchange="doScanMonth()"
                    class="bg-slate-50 border border-slate-300 text-slate-700 py-2 px-3 rounded-lg text-sm font-semibold focus:outline-none focus:ring-2 focus:ring-blue-500 shadow-sm transition-all cursor-pointer">
                    <option>Select Month...</option>
                </select>

                <button onclick="doScanAll()"
                    class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-5 rounded-lg text-sm shadow-md shadow-blue-500/30 transition-all duration-200 active:scale-95 flex items-center space-x-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15">
                        </path>
                    </svg>
                    <span>Scan All</span>
                </button>
            </div>
        </div>
    </div>

    <script>
        // Store mappings for styling
        const statusConfig = {
            'EXPIRED': { bg: 'bg-red-50', border: 'border-red-200', text: 'text-red-700', badge: 'bg-red-100 text-red-800' },
            'DAYS BEFORE EXPIRY': { bg: 'bg-orange-50', border: 'border-orange-200', text: 'text-orange-700', badge: 'bg-orange-100 text-orange-800' },
            '2-WEEK NOTICE': { bg: 'bg-yellow-50', border: 'border-yellow-200', text: 'text-yellow-700', badge: 'bg-yellow-100 text-yellow-800' },
            'SUFFICIENT TIME': { bg: 'bg-green-50', border: 'border-green-200', text: 'text-green-700', badge: 'bg-green-100 text-green-800' },
            'PLEASE INPUT LAST REG': { bg: 'bg-slate-50', border: 'border-slate-200', text: 'text-slate-700', badge: 'bg-slate-200 text-slate-800' },
            'REGISTERED': { bg: 'bg-blue-50', border: 'border-blue-200', text: 'text-blue-700', badge: 'bg-blue-100 text-blue-800' }
        };

        function updateAlerts(alerts, sheets) {
            const container = document.getElementById('alerts-container');
            container.innerHTML = '';

            let hasAlerts = false;

            // Order based on priority
            const order = ['EXPIRED', 'DAYS BEFORE EXPIRY', '2-WEEK NOTICE', 'SUFFICIENT TIME', 'PLEASE INPUT LAST REG', 'REGISTERED'];

            order.forEach(statusKey => {
                let matchingPlates = [];
                for (let fullStatus in alerts) {
                    if (fullStatus.includes(statusKey)) {
                        matchingPlates = matchingPlates.concat(alerts[fullStatus]);
                    }
                }

                if (matchingPlates.length > 0) {
                    hasAlerts = true;
                    const style = statusConfig[statusKey] || statusConfig['PLEASE INPUT LAST REG'];

                    const card = document.createElement('div');
                    card.className = `${style.bg} ${style.border} border rounded-lg p-3 mb-3 shadow-sm transition-all hover:shadow-md`;

                    card.innerHTML = `
                        <div class="flex items-center justify-between mb-2">
                            <span class="font-bold ${style.text} text-sm flex items-center">
                                <span class="w-2 h-2 rounded-full mr-2 ${style.text.replace('text', 'bg')}"></span>
                                ${statusKey}
                            </span>
                            <span class="text-xs font-bold px-2 py-1 rounded-full ${style.badge}">${matchingPlates.length} Plates</span>
                        </div>
                        <p class="text-xs ${style.text} opacity-80 leading-relaxed font-mono">
                            ${matchingPlates.join(', ')}
                        </p>
                    `;
                    container.appendChild(card);
                }
            });

            if (!hasAlerts) {
                container.innerHTML = `
                    <div class="flex flex-col items-center justify-center h-full text-green-600 mt-10">
                        <svg class="w-12 h-12 mb-3 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        <p class="font-bold text-lg">All vehicles up to date</p>
                    </div>
                `;
            }

            // Update sheets dropdown
            const select = document.getElementById('month-select');
            select.innerHTML = '<option>Select Month...</option>';
            sheets.forEach(s => {
                const opt = document.createElement('option');
                opt.value = s;
                opt.innerText = s;
                select.appendChild(opt);
            });

            setStatus("Ready");
        }

        function setStatus(msg) {
            document.getElementById('status-text').innerText = msg;
        }

        function doScanAll() {
            setStatus("Scanning all sheets in background...");
            eel.do_scan_all();
        }

        function doScanMonth() {
            const val = document.getElementById('month-select').value;
            if (val !== 'Select Month...') {
                setStatus(`Scanning ${val} in background...`);
                eel.do_scan_month(val);
                setTimeout(() => document.getElementById('month-select').selectedIndex = 0, 500);
            }
        }

        function closeWindow() {
            window.close();
        }

        // Expose updateAlerts to Eel
        eel.expose(updateAlerts);

        // Fetch on load
        window.addEventListener('load', async () => {
            const data = await eel.get_current_alerts()();
            if (data && data.alerts) {
                updateAlerts(data.alerts, data.sheets);
            }
        });
    </script>
</body>

</html>
